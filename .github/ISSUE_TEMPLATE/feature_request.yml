name: 💡 Feature Request
description: Suggest an idea for CopyFlow
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!
        
  - type: textarea
    id: problem
    attributes:
      label: Problem you're trying to solve
      description: A clear description of what problem this feature would solve
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
      
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like CopyFlow to solve this problem
      placeholder: "I'd like to be able to..."
    validations:
      required: true
      
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or workarounds you've considered
      
  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Critical (blocking my work)
        - High (would significantly improve my workflow)
        - Medium (nice to have)
        - Low (just an idea)
    validations:
      required: true
      
  - type: checkboxes
    id: contribution
    attributes:
      label: Would you like to work on this feature?
      options:
        - label: I'm willing to submit a PR for this feature
          
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or examples
